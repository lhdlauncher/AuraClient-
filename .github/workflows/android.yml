name: Android CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  BuildRelease:
    if: github.ref_name == 'main'
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        arch: ["all", "arm", "arm64", "x86", "x86_64"]
      fail-fast: false

    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
      MOVTERY_KEYSTORE_PASSWORD: ${{ secrets.MOVTERY_KEYSTORE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build type
        run: echo "ZL_BUILD_TYPE=RELEASE" >> $GITHUB_ENV

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Validate Keystore Secret
        run: |
          if [ -z "$MOVTERY_KEYSTORE_PASSWORD" ]; then
            echo "❌ MOVTERY_KEYSTORE_PASSWORD is missing"
            exit 1
          else
            echo "✅ Keystore password loaded"
          fi

      - name: Build JRE
        run: ./gradlew :jre_lwjgl3glfw:build --no-daemon

      - name: Build Release
        run: ./gradlew :ZalithLauncher:assembleRelease -Darch=${{ matrix.arch }} --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AuraClient-Release-${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/release/*.apk


  BuildDebug:
    if: github.ref_name != 'main'
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        arch: ["all", "arm", "arm64", "x86", "x86_64"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build JRE
        run: ./gradlew :jre_lwjgl3glfw:build --no-daemon

      - name: Build Debug
        run: ./gradlew :ZalithLauncher:assembleDebug -Darch=${{ matrix.arch }} --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AuraClient-Debug-${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/debug/*.apk
